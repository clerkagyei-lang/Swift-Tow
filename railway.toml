[build]
builder = "nixpacks"
buildCommand = "PORT=3000 BASE_PATH=/admin-dashboard/ pnpm --filter @workspace/admin-dashboard run build && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
