kind = "web"
previewPath = "/admin-dashboard/"
title = "Swift Tow Admin"
version = "1.0.0"
id = "artifacts/admin-dashboard"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = []
localPort = 22133

[services.env]
PORT = "22133"
BASE_PATH = "/admin-dashboard/"

[services.development]
run = "pnpm --filter @workspace/admin-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/admin-dashboard", "run", "build" ]
publicDir = "artifacts/admin-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
